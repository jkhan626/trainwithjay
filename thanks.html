<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Thanks — Rockaway Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Karla:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--sand:#FBF6EC;--ink:#16242F;--orange:#E2572B;--seafoam:#7FB6A4;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--sand);color:var(--ink);font-family:'Karla',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;text-align:center;}
  .wrap{max-width:560px;}
  .badge{width:64px;height:64px;border-radius:50%;background:var(--seafoam);color:var(--ink);font-size:34px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;}
  h1{font-family:'Fraunces';font-weight:900;font-size:clamp(32px,6vw,46px);line-height:1.05;letter-spacing:-0.02em;margin-bottom:14px;}
  h1 .em{font-style:italic;color:var(--orange);}
  p{font-size:18px;line-height:1.6;color:rgba(22,36,47,.78);margin-bottom:10px;}
  .btn{display:inline-block;margin-top:22px;background:var(--ink);color:var(--sand);font-weight:700;padding:15px 30px;border-radius:9999px;text-decoration:none;font-size:16px;}
  .small{margin-top:18px;font-size:14px;color:rgba(22,36,47,.6);}
  a.link{color:var(--orange);font-weight:700;text-decoration:none;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="badge">&#10003;</div>
    <h1>Got it. <span class="em">Talk soon.</span></h1>
    <p>Thanks for reaching out. I read every message myself, and I will text or email you back within a few hours to set up your free intro.</p>
    <p>In a hurry? Text or call me directly at <a class="link" href="tel:+13473138748">(347) 313-8748</a>.</p>
    <a class="btn" href="/">Back to home</a>
    <div class="small">Jamal &middot; Rockaway Trainer &middot; jamal@rockawaytrainer.com</div>
  </div>
</body>
</html>
