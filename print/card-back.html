<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Karla:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--sand:#FBF6EC;--ink:#16242F;--orange:#E2572B;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{size:2.75in 2.75in;margin:0;}
  html,body{background:#888;}
  .card{width:2.75in;height:2.75in;background:var(--sand);color:var(--ink);position:relative;overflow:hidden;font-family:'Karla',system-ui,sans-serif;}
  .pad{position:absolute;top:0.3in;right:0.3in;bottom:0.3in;left:0.3in;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .qr{width:1.05in;height:1.05in;display:block;}
  .scan{font-size:7.5px;text-transform:uppercase;letter-spacing:.09em;color:rgba(22,36,47,.55);margin-top:3px;font-weight:700;}
  .name{font-family:'Fraunces';font-weight:800;font-size:16px;margin-top:12px;line-height:1.05;}
  .cred{font-size:7.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--orange);font-weight:700;margin-top:4px;}
  .info{font-size:11px;line-height:1.6;margin-top:9px;}
  .info .strong{font-weight:700;}
</style></head><body>
  <div class="card"><div class="pad">
    <img class="qr" src="qr.png" alt="Scan to visit rockawaytrainer.com">
    <div class="scan">Scan to start</div>
    <div class="name">Jamal Khan, CSCS</div>
    <div class="cred">Certified Strength &amp; Conditioning Specialist</div>
    <div class="info">
      <div class="strong">(347) 313-8748</div>
      <div>jamal@rockawaytrainer.com</div>
      <div>rockawaytrainer.com</div>
    </div>
  </div></div>
</body></html>
