<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Karla:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--sand:#FBF6EC;--ink:#16242F;--orange:#E2572B;--seafoam:#7FB6A4;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{size:2.75in 2.75in;margin:0;}
  html,body{background:#888;}
  .card{width:2.75in;height:2.75in;background:var(--ink);color:var(--sand);position:relative;overflow:hidden;font-family:'Karla',system-ui,sans-serif;}
  .pad{position:absolute;top:0.32in;right:0.32in;bottom:0.32in;left:0.32in;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .brand{font-family:'Fraunces';font-weight:900;font-size:36px;line-height:0.96;letter-spacing:-0.01em;}
  .brand .t{font-style:italic;color:var(--orange);}
  .tag{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--seafoam);margin-top:14px;font-weight:700;}
  .sub{font-size:11.5px;color:rgba(245,238,221,.82);margin-top:10px;line-height:1.5;}
</style></head><body>
  <div class="card"><div class="pad">
    <div class="brand">Rockaway<br><span class="t">Trainer</span></div>
    <div class="tag">In-home personal training</div>
    <div class="sub">Strength training that<br>comes to you.</div>
  </div></div>
</body></html>
